apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  namespace: storage-svc
  labels:
    app: storage-service
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage-service
  template:
    metadata:
      labels:
        app: storage-service
        app.kubernetes.io/part-of: smartfarming
        environment: local
    spec:
      serviceAccountName: storage-service
      containers:
        - name: storage-service
          image: localhost:32000/storage-service:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: storage-config
            - secretRef:
                name: storage-secret
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: storage-svc
  labels:
    app: storage-service
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  selector:
    app: storage-service
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: storage-service-hpa
  namespace: storage-svc
  labels:
    app: storage-service
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: storage-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
