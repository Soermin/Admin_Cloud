apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: farm-db-svc
  labels:
    app: postgres-postgresql
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-postgresql
  namespace: farm-db-svc
  labels:
    app: postgres-postgresql
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-postgresql
  template:
    metadata:
      labels:
        app: postgres-postgresql
        app.kubernetes.io/part-of: smartfarming
        environment: local
    spec:
      serviceAccountName: postgres
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: postgres-secret
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - farming
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - farming
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-postgresql
  namespace: farm-db-svc
  labels:
    app: postgres-postgresql
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  selector:
    app: postgres-postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  type: ClusterIP
