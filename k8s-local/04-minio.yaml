apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: storage-svc
  labels:
    app: minio-local
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-local
  namespace: storage-svc
  labels:
    app: minio-local
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-local
  template:
    metadata:
      labels:
        app: minio-local
        app.kubernetes.io/part-of: smartfarming
        environment: local
    spec:
      serviceAccountName: minio
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          envFrom:
            - secretRef:
                name: minio-secret
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: storage-svc
  labels:
    app: minio-local
    app.kubernetes.io/part-of: smartfarming
    environment: local
spec:
  selector:
    app: minio-local
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
  type: ClusterIP
