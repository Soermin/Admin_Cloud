server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    resolver 10.152.183.10 valid=10s ipv6=off;
    set $farm_data_upstream farm-data-service.farm-db-svc.svc.cluster.local:8000;
    set $storage_upstream storage-service.storage-svc.svc.cluster.local:8000;
    
    # Reverse proxy untuk farm-data-service API - PRIORITAS UTAMA
    location /api/ {
        proxy_pass http://$farm_data_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # Reverse proxy untuk storage-service API
    location /storage/ {
        proxy_pass http://$storage_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static files dan SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
