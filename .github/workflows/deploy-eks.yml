name: Deploy SmartFarming to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_INFRA_STATE_KEY: ${{ vars.TF_INFRA_STATE_KEY || 'smartfarming/dev/infra/terraform.tfstate' }}
  TF_WORKLOADS_STATE_KEY: ${{ vars.TF_WORKLOADS_STATE_KEY || 'smartfarming/dev/workloads/terraform.tfstate' }}
  IMAGE_TAG: ${{ github.sha }}
  TF_IN_AUTOMATION: "true"

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform

      - name: Build and push farm-data-service
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/farm-data-service:${IMAGE_TAG}
          docker build -t $IMAGE_URI farm-data-service
          docker push $IMAGE_URI
          echo "FARM_DATA_IMAGE=$IMAGE_URI" >> $GITHUB_ENV

      - name: Build and push storage-service
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/storage-service:${IMAGE_TAG}
          docker build -t $IMAGE_URI storage-service
          docker push $IMAGE_URI
          echo "STORAGE_IMAGE=$IMAGE_URI" >> $GITHUB_ENV

      - name: Build and push frontend
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/frontend:${IMAGE_TAG}
          docker build -t $IMAGE_URI frontend-app
          docker push $IMAGE_URI
          echo "FRONTEND_IMAGE=$IMAGE_URI" >> $GITHUB_ENV

      - name: Build and push iot-simulator
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/iot-simulator:${IMAGE_TAG}
          docker build -t $IMAGE_URI iot-simulator
          docker push $IMAGE_URI
          echo "IOT_IMAGE=$IMAGE_URI" >> $GITHUB_ENV

      - name: Terraform workloads init
        run: |
          terraform -chdir=terraform/environments/dev/workloads init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_WORKLOADS_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform workloads apply
        run: |
          terraform -chdir=terraform/environments/dev/workloads apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="state_bucket=${TF_STATE_BUCKET}" \
            -var="infra_state_key=${TF_INFRA_STATE_KEY}" \
            -var="image_tag=${IMAGE_TAG}"
