services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: farming
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farming"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  farm-data-service:
    build:
      context: ./farm-data-service
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/farming
      DB_INIT_RETRIES: "60"
      DB_INIT_DELAY_SECONDS: "2"
      CROP_DAYS_SINCE_PLANTING: "10"
      CROP_EXPECTED_HARVEST_DAYS: "60"
      CROP_TARGET_ENERGY_KWH_PER_DAY: "100"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 12

  storage-service:
    build:
      context: ./storage-service
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: minio123
      S3_BUCKET: reports
      S3_INIT_RETRIES: "60"
      S3_INIT_DELAY_SECONDS: "2"
    ports:
      - "8001:8000"
    depends_on:
      - minio
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend-app
    ports:
      - "8080:80"
    volumes:
      - ./frontend-app/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-app/html:/usr/share/nginx/html:ro
    depends_on:
      farm-data-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy

  iot-simulator:
    build:
      context: ./iot-simulator
    environment:
      FARM_DATA_URL: http://farm-data-service:8000
      INTERVAL_SECONDS: "60"
    depends_on:
      farm-data-service:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
